name: Attest Release

on:
  release:
    types: [published]

permissions:
  id-token: write      # required for OIDC token (Sigstore keyless signing)
  attestations: write  # required for gh attestation
  contents: write      # required to upload assets to release

jobs:
  attest:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name }}
      REPO: ${{ github.repository }}
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$TAG" --repo "$REPO" --dir ./artifacts

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ./artifacts/brikc-*

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binaries with cosign keyless (Sigstore)
        run: |
          for f in ./artifacts/brikc-*; do
            cosign sign-blob "$f" \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              --yes
            echo "Signed: $(basename $f)"
          done

      - name: Upload signatures to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG" ./artifacts/*.sig ./artifacts/*.pem \
            --repo "$REPO" --clobber
